<div class="widget widget-container erop-css-earth-wrap">

  <style type="text/css">
    .erop-css-earth-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 240px;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(0,180,255,0.08), transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(0,255,180,0.05), transparent 35%),
        linear-gradient(180deg, #03111f 0%, #071a2d 45%, #020912 100%);
      border-radius: 12px;
      color: #d9ecff;
      box-sizing: border-box;
    }

    .erop-css-earth-wrap * {
      box-sizing: border-box;
    }

    .erop-css-earth-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px 0 14px;
    }

    .erop-css-earth-title {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #d9ecff;
    }

    .erop-css-earth-action {
      cursor: pointer;
      opacity: 0.9;
    }

    .erop-css-earth-body {
      position: relative;
      width: 100%;
      height: calc(100% - 42px);
      min-height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px 10px 10px;
    }

    .erop-css-earth-stage {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 170px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      perspective: 1200px;
      overflow: hidden;
      padding-left: 42px;
    }

    .erop-css-earth-stage::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(2px 2px at 10% 20%, rgba(255,255,255,0.75), transparent 60%),
        radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,0.55), transparent 60%),
        radial-gradient(1.5px 1.5px at 70% 15%, rgba(255,255,255,0.7), transparent 60%),
        radial-gradient(2px 2px at 85% 65%, rgba(255,255,255,0.45), transparent 60%),
        radial-gradient(1.5px 1.5px at 55% 45%, rgba(255,255,255,0.4), transparent 60%),
        radial-gradient(1px 1px at 15% 70%, rgba(255,255,255,0.5), transparent 60%);
      opacity: 0.85;
      pointer-events: none;
    }

    /* 수정: 지구 크기와 바깥 궤도선 속도 animation */
    .erop-css-earth-orbit {
      position: absolute;
      width: 310px;
      height: 310px;
      border: 1px solid rgba(91, 177, 255, 0.14);
      border-radius: 50%;
      transform-style: preserve-3d;
      animation: eropOrbitSpin 10s linear infinite;
      filter: drop-shadow(0 0 10px rgba(72, 167, 255, 0.12));
    }

    /* 수정: 지구 크기 */
    .erop-css-earth-globe {
      position: relative;
      width: 230px;
      height: 230px;
      border-radius: 50%;
      transform-style: preserve-3d;
      box-shadow:
        inset -26px -24px 40px rgba(0, 0, 0, 0.42),
        inset 16px 14px 28px rgba(255, 255, 255, 0.12),
        0 0 40px rgba(20, 170, 255, 0.18),
        0 0 100px rgba(18, 95, 188, 0.10);
      background:
        radial-gradient(circle at 30% 28%, rgba(255,255,255,0.30), transparent 18%),
        radial-gradient(circle at 35% 35%, rgba(255,255,255,0.08), transparent 28%),
        radial-gradient(circle at 60% 70%, rgba(0,0,0,0.22), transparent 42%),
        linear-gradient(180deg, #3dd8ff 0%, #0d79d7 45%, #06386f 100%);
      overflow: hidden;
      animation:
        eropGlobeFloat 6s ease-in-out infinite,
        eropGlobeTilt 14s ease-in-out infinite;
    }

    /* 수정: 회전 링 크기와 링 회전 속도 animation */
    .erop-css-earth-ring {
      position: absolute;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      border: 1px dashed rgba(129, 205, 255, 0.18);
      transform: rotateX(75deg);
      animation: eropRingRotate 8s linear infinite;
      pointer-events: none;
    }
