<script src="widgets/installed/eRopCssGlobe-1.0.0/widgetAssets/js/widgetUtility.service.js"></script>

<form data-ng-submit="save()" class="noMargin" name="editForm" novalidate>

  <div class="modal-header">
    <h3 class="modal-title col-md-9">CSS Globe Settings</h3>
    <button type="button" class="close" data-ng-click="cancel()" data-dismiss="modal"
      aria-label="Close" id="close-edit-widget-form-btn">
      <div aria-hidden="true" class="version-button">+</div>
    </button>
  </div>

  <div class="modal-body">

    <!-- Title -->
    <div class="form-group"
      data-ng-class="{ 'has-error': editForm.title.$invalid && editForm.title.$touched }">
      <label for="wgt-title" class="control-label">
        Title <span class="text-danger">*</span>
      </label>
      <input id="wgt-title" name="title" type="text" class="form-control"
        data-ng-model="config.title" required placeholder="Widget title">
      <div data-cs-messages="editForm.title"></div>
    </div>

    <!-- Spin Speed -->
    <div class="form-group">
      <label for="wgt-speed" class="control-label">Rotation Speed</label>
      <select id="wgt-speed" name="spinSpeed" class="form-control"
        data-ng-model="config.spinSpeed"
        data-ng-options="opt.value as opt.label for opt in speedOptions">
      </select>
      <p class="help-block" style="font-size:11px;margin-top:4px;">
        Controls how fast the globe rotates. The animation is driven by CSS only.
      </p>
    </div>

    <!-- Live preview hint -->
    <div style="border:1px solid rgba(255,255,255,0.08);border-radius:4px;padding:10px 14px;font-size:12px;color:rgba(255,255,255,0.45);">
      The globe is rendered entirely with CSS — no JavaScript, no Canvas, no SVG.
      Land masses are &lt;div&gt; elements styled with border-radius and CSS animations.
    </div>

  </div>

  <div class="modal-footer">
    <button id="edit-widget-save" type="submit" class="btn btn-sm btn-primary">
      <i class="icon icon-check margin-right-sm"></i>{{ viewWidgetVars.BTN_SAVE || 'Save' }}
    </button>
    <button id="edit-widget-cancel" type="button" class="btn btn-sm btn-default"
      data-ng-click="cancel()">
      <i class="icon icon-close margin-right-sm"></i>{{ viewWidgetVars.BTN_CLOSE || 'Close' }}
    </button>
  </div>

</form>
