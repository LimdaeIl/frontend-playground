/* ══════════════════════════════════════════════
   eRopCssGlobe — Pure CSS Rotating Globe
   ══════════════════════════════════════════════ */

.erg-wrap {
  position: relative;
  min-height: 320px;
  overflow: hidden;
}

/* Star field background */
.erg-stars {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background-image:
    radial-gradient(1px 1px at  8% 12%, rgba(255,255,255,0.55) 0%, transparent 100%),
    radial-gradient(1px 1px at 22% 72%, rgba(255,255,255,0.40) 0%, transparent 100%),
    radial-gradient(1px 1px at 38%  6%, rgba(255,255,255,0.45) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 85%, rgba(255,255,255,0.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 71% 30%, rgba(255,255,255,0.50) 0%, transparent 100%),
    radial-gradient(1px 1px at 84% 58%, rgba(255,255,255,0.40) 0%, transparent 100%),
    radial-gradient(1px 1px at 93% 18%, rgba(255,255,255,0.45) 0%, transparent 100%),
    radial-gradient(1px 1px at 14% 48%, rgba(255,255,255,0.30) 0%, transparent 100%),
    radial-gradient(1px 1px at 62% 52%, rgba(255,255,255,0.25) 0%, transparent 100%),
    radial-gradient(1px 1px at 77% 90%, rgba(255,255,255,0.35) 0%, transparent 100%),
    radial-gradient(2px 2px at 46% 23%, rgba(255,255,255,0.20) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 75%, rgba(255,255,255,0.30) 0%, transparent 100%);
  pointer-events: none;
}

/* Center wrapper for the globe + atmosphere */
.erg-globe-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 0 20px;
  position: relative;
}

/* ── Atmospheric glow ─────────────────────────── */
.erg-atmosphere {
  position: absolute;
  width: 270px;
  height: 270px;
  border-radius: 50%;
  pointer-events: none;
  animation: erg-atm-pulse 5s ease-in-out infinite;
}

@keyframes erg-atm-pulse {
  0%, 100% {
    box-shadow:
      0 0 25px 8px  rgba(79, 195, 247, 0.10),
      0 0 55px 22px rgba(79, 195, 247, 0.05);
  }
  50% {
    box-shadow:
      0 0 35px 14px rgba(79, 195, 247, 0.16),
      0 0 75px 35px rgba(79, 195, 247, 0.08);
  }
}

/* ── Globe sphere (clips the scrolling map) ────── */
.erg-globe {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  overflow: hidden;
  position: relative;
  /* Deep ocean gradient */
  background: linear-gradient(150deg, #1565C0 0%, #0D47A1 45%, #09296E 100%);
  box-shadow:
    inset -40px -22px 70px rgba(0, 0, 0, 0.78),
    inset  10px  12px 30px rgba(255, 255, 255, 0.04),
    0 0 0 2px rgba(79, 195, 247, 0.28),
    0 14px 55px rgba(13, 71, 161, 0.55);
}

/* ── Scrolling map track (200% wide = 440 px) ──── */
/*    left  0-219 px  → copy 1                      */
/*    left 220-439 px → copy 2 (seamless loop)      */
.erg-track {
  position: absolute;
  top: 0; left: 0;
  width: 200%; height: 100%;
  animation: erg-globe-spin linear infinite;
  animation-duration: inherit;   /* inherits from parent; overridden by ng-style */
}

@keyframes erg-globe-spin {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* ── Land base style ──────────────────────────── */
.erg-l { position: absolute; }

/* ── Latitude grid lines (overlay, static) ─────── */
.erg-lats {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    transparent              0,
    transparent              calc(220px / 6 - 1px),
    rgba(100,181,246,0.07)   calc(220px / 6 - 1px),
    rgba(100,181,246,0.07)   calc(220px / 6)
  );
  pointer-events: none;
}

/* ── 3-D sphere shading (top overlay) ─────────── */
.erg-shade {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background:
    /* highlight top-left */
    radial-gradient(circle at 33% 28%,
      rgba(255,255,255,0.22)  0%,
      rgba(255,255,255,0.06) 22%,
      transparent             48%),
    /* shadow bottom-right */
    radial-gradient(circle at 74% 71%,
      rgba(0,0,20,0.58)  0%,
      rgba(0,0,10,0.20) 35%,
      transparent        62%),
    /* rim darkening */
    radial-gradient(circle at 50% 50%,
      transparent        30%,
      rgba(0,0,0,0.12)  75%,
      rgba(0,0,0,0.38) 100%);
  pointer-events: none;
}

/* ── Globe label ──────────────────────────────── */
.erg-label {
  margin-top: 18px;
  font-size: 10px;
  color: rgba(255, 255, 255, 0.30);
  letter-spacing: 4px;
  text-transform: uppercase;
  font-family: 'Courier New', monospace;
}
</style>
